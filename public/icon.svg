<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="peachGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFAD9E"/>
      <stop offset="100%" stop-color="#E8917F"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8E6CF"/>
      <stop offset="100%" stop-color="#7DD4AE"/>
    </linearGradient>
    <linearGradient id="lavGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C3B1E1"/>
      <stop offset="100%" stop-color="#DDD1F0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#1A1A2E"/>
  <!-- Hexagon outline -->
  <polygon points="256,52 430,152 430,360 256,460 82,360 82,152" fill="none" stroke="url(#peachGrad)" stroke-width="6" opacity="0.3"/>
  <!-- Inner hexagon fill -->
  <polygon points="256,72 414,162 414,350 256,440 98,350 98,162" fill="#FFAD9E" opacity="0.06"/>
  <!-- GIG text -->
  <text x="256" y="285" text-anchor="middle" font-family="'Quicksand', 'SF Pro Rounded', 'Helvetica Neue', sans-serif" font-weight="700" font-size="160" fill="url(#peachGrad)" letter-spacing="-4">GIG</text>
  <!-- Small dumbbell icon below text -->
  <!-- Left weight -->
  <rect x="206" y="320" width="16" height="28" rx="4" fill="url(#mintGrad)" opacity="0.7"/>
  <!-- Bar -->
  <rect x="222" y="329" width="68" height="10" rx="3" fill="url(#mintGrad)" opacity="0.5"/>
  <!-- Right weight -->
  <rect x="290" y="320" width="16" height="28" rx="4" fill="url(#mintGrad)" opacity="0.7"/>
</svg>
